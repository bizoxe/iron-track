name: "Bug Report"
description: "Report a software bug to help us improve IronTrack"
title: "[BUG]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Tell us how to reproduce this issue.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / Commit
      description: What version or commit hash are you using? (e.g., 0.1.0 or main)
      placeholder: "e.g., 0.1.0 or a7b3c4d"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or Traceback
      description: Please provide logs or a traceback if applicable.
      render: python
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.