x-development-volumes: &development-volumes
  volumes:
    - ./src:/workspace/app/src/
    - ./tests:/workspace/app/tests/
    - ./docs:/workspace/app/docs/
    - ./Makefile:/workspace/app/Makefile
    - ./pyproject.toml:/workspace/app/pyproject.toml
    - ./uv.lock:/workspace/app/uv.lock
    - ./.env.docker.dev:/workspace/app/src/app/config/.env


services:
  app:
    build:
      context: .
      dockerfile: deploy/app/dev/Dockerfile
    tty: true
    restart: unless-stopped
    command: app server dev --host 0.0.0.0 --port 8000
    env_file:
      - .env.docker.dev
    <<: *development-volumes
    ports:
      - "8000:8000"
    depends_on:
      pgbouncer:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      test: [
        "CMD", "python", "-c",
        "import socket; s = socket.socket(socket.AF_INET, socket.SOCK_STREAM); s.connect(('127.0.0.1', 8000)); s.sendall(b'GET /health HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n'); response = s.recv(1024); s.close(); exit(0) if b'200 OK' in response else exit(1)"
      ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  migrator:
    build:
      context: .
      dockerfile: deploy/app/dev/Dockerfile
    command: app database upgrade --no-prompt
    restart: "no"
    env_file:
      - .env.docker.dev
    <<: *development-volumes
    depends_on:
      pgbouncer:
        condition: service_healthy
      valkey:
        condition: service_healthy

  pgadmin:
    container_name: pg_admin_iron_track
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: "admin@admin.com"
      PGADMIN_DEFAULT_PASSWORD: root
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    restart: unless-stopped
